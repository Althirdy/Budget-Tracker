services:
  frontend:
    image: node:22-alpine
    container_name: trio_expense_frontend
    working_dir: /app

    ports:
      - "5173:5173"

    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

    command: npm run dev -- --host 0.0.0.0

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: trio_expense_api
    working_dir: /app
    volumes:
      - ./api:/app
    depends_on:
      - mysql

  api_nginx:
    image: nginx:1.27-alpine
    container_name: trio_expense_api_nginx
    ports:
      - "8080:80"
    volumes:
      - ./api:/app
      - ./api/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

  mysql:
    image: mysql:8.4
    container_name: trio_expense_mysql
    environment:
      MYSQL_DATABASE: yii2app
      MYSQL_USER: yii2
      MYSQL_PASSWORD: yii2pass
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  frontend_node_modules:
  mysql_data:
