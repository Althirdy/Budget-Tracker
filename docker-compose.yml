services:
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: budget_tracker_client
    working_dir: /app
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api/v1}
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1:5173"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: budget_tracker_api
    working_dir: /var/www/html
    env_file:
      - ./api/.env
    volumes:
      - ./api:/var/www/html
      - api_vendor:/var/www/html/vendor
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 10s
      timeout: 5s
      retries: 5

  api_nginx:
    image: nginx:1.27-alpine
    container_name: budget_tracker_api_nginx
    ports:
      - "8080:80"
    volumes:
      - ./api:/var/www/html:ro
      - ./api/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1/nginx-health"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:8.4
    container_name: budget_tracker_mysql
    environment:
      MYSQL_DATABASE: budget_tracker
      MYSQL_USER: budget_user
      MYSQL_PASSWORD: budget_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  api_vendor:
  client_node_modules:
  mysql_data:
